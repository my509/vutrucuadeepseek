<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hệ Mặt Trời 3D • Thuyết Trình Nâng Cao</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #000;
    }
    #info-panel {
      position: fixed;
      bottom: 30px;
      left: 30px;
      max-width: 420px;
      width: calc(100% - 60px);
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 24px;
      color: #fff;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.15);
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s;
      transform: translateY(0);
      opacity: 1;
      z-index: 100;
      pointer-events: auto;
    }
    #info-panel.hidden {
      transform: translateY(calc(100% + 50px));
      opacity: 0;
      pointer-events: none;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    }
    #planet-name {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 10px;
      background: linear-gradient(135deg, #fff 0%, #a0c8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.4px;
    }
    #planet-details {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #d0d8e8;
      margin-bottom: 18px;
    }
    #planet-details p {
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 4px;
    }
    #planet-details strong {
      font-weight: 600;
      color: #ffffff;
    }
    #back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.25s;
      letter-spacing: 0.3px;
    }
    #back-btn:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.6);
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(100,180,255,0.4);
    }
    @media (max-width: 600px) {
      #info-panel {
        bottom: 20px;
        left: 20px;
        max-width: calc(100% - 40px);
        padding: 18px;
      }
      #planet-name { font-size: 1.6rem; }
    }
    .instruction {
      position: fixed;
      bottom: 30px;
      right: 30px;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      pointer-events: none;
      z-index: 90;
    }
  </style>
</head>
<body>
  <div id="info-panel" class="hidden">
    <h2 id="planet-name"></h2>
    <div id="planet-details"></div>
    <button id="back-btn">← Quay lại toàn cảnh</button>
  </div>
  <div class="instruction">🖱️ Kéo để xoay • Cuộn để zoom • Click vào hành tinh</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ─── KHỞI TẠO SCENE, CAMERA, RENDERER ─────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
    camera.position.set(0, 400, 800);
    camera.lookAt(0, 0, 0);

    // WebGLRenderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // CSS2 Renderer cho nhãn
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none'; // cho phép click xuyên qua
    document.body.appendChild(labelRenderer.domElement);

    // ─── ÁNH SÁNG ─────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x333355);
    scene.add(ambientLight);
    const sunLight = new THREE.PointLight(0xffeedd, 2, 0, 0);
    sunLight.position.set(0, 0, 0);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 512;
    sunLight.shadow.mapSize.height = 512;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 1000;
    scene.add(sunLight);

    // ─── SAO NỀN ──────────────────────────────────────────────
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 1500;
    const starsPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i += 3) {
      starsPositions[i] = (Math.random() - 0.5) * 3000;
      starsPositions[i+1] = (Math.random() - 0.5) * 3000;
      starsPositions[i+2] = (Math.random() - 0.5) * 3000;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // ─── MẶT TRỜI ─────────────────────────────────────────────
    const sunGeometry = new THREE.SphereGeometry(30, 64, 64);
    const sunMaterial = new THREE.MeshStandardMaterial({
      color: 0xffaa00,
      emissive: new THREE.Color(0xff5500),
      roughness: 0.5
    });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    sun.castShadow = false;
    sun.receiveShadow = false;
    scene.add(sun);

    // Hào quang mặt trời (sprite)
    const glowTexture = createGlowTexture();
    const glowMaterial = new THREE.SpriteMaterial({ map: glowTexture, blending: THREE.AdditiveBlending, color: 0xff8800 });
    const glowSprite = new THREE.Sprite(glowMaterial);
    glowSprite.scale.set(120, 120, 1);
    sun.add(glowSprite);

    function createGlowTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      gradient.addColorStop(0, 'rgba(255,200,50,1)');
      gradient.addColorStop(0.3, 'rgba(255,100,0,0.8)');
      gradient.addColorStop(0.7, 'rgba(255,50,0,0.2)');
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(canvas);
    }

    // ─── DỮ LIỆU HÀNH TINH ────────────────────────────────────
    const planetsData = [
      { name: 'Sao Thủy', color: 0xb0b5b9, size: 3.0, distance: 60, speed: 0.02, info: { diameter:'4.879 km', dist:'57,9 tr km', period:'88 ngày', moons:'0', temp:'-180°C đến 430°C', fact:'Nhỏ nhất, gần Mặt Trời nhất.' } },
      { name: 'Sao Kim', color: 0xe6c229, size: 4.8, distance: 90, speed: 0.015, info: { diameter:'12.104 km', dist:'108,2 tr km', period:'225 ngày', moons:'0', temp:'462°C', fact:'Nóng nhất, khí quyển CO₂ dày.' } },
      { name: 'Trái Đất', color: 0x3b7dd8, size: 5.0, distance: 125, speed: 0.012, info: { diameter:'12.742 km', dist:'149,6 tr km', period:'365,25 ngày', moons:'1', temp:'15°C', fact:'Hành tinh duy nhất có sự sống.' } },
      { name: 'Sao Hỏa', color: 0xc1440e, size: 3.8, distance: 165, speed: 0.01, info: { diameter:'6.779 km', dist:'227,9 tr km', period:'687 ngày', moons:'2', temp:'-65°C', fact:'Hành tinh đỏ, núi Olympus Mons.' } },
      { name: 'Sao Mộc', color: 0xd4a373, size: 12, distance: 240, speed: 0.007, info: { diameter:'139.820 km', dist:'778,5 tr km', period:'11,86 năm', moons:'95', temp:'-110°C', fact:'Lớn nhất, Vết Đỏ Lớn.' } },
      { name: 'Sao Thổ', color: 0xf4d03f, size: 10, distance: 310, speed: 0.0055, ring: true, info: { diameter:'116.460 km', dist:'1,43 tỷ km', period:'29,46 năm', moons:'146', temp:'-140°C', fact:'Vành đai băng đá ngoạn mục.' } },
      { name: 'Sao Thiên Vương', color: 0x6fd4d4, size: 7.5, distance: 380, speed: 0.004, info: { diameter:'50.724 km', dist:'2,87 tỷ km', period:'84 năm', moons:'27', temp:'-195°C', fact:'Quay nghiêng ~98°.' } },
      { name: 'Sao Hải Vương', color: 0x2d5f9e, size: 7.0, distance: 450, speed: 0.0032, info: { diameter:'49.244 km', dist:'4,5 tỷ km', period:'164,8 năm', moons:'16', temp:'-200°C', fact:'Gió nhanh nhất (2100 km/h).' } }
    ];

    const planets = [];
    const orbits = [];

    planetsData.forEach((data, index) => {
      // Quỹ đạo
      const orbitPoints = [];
      const radius = data.distance;
      for (let i = 0; i <= 64; i++) {
        const angle = (i / 64) * Math.PI * 2;
        orbitPoints.push(new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius));
      }
      const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
      const orbitMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.15, transparent: true });
      const orbitLine = new THREE.LineLoop(orbitGeometry, orbitMaterial);
      scene.add(orbitLine);
      orbits.push(orbitLine);

      // Hành tinh
      const geometry = new THREE.SphereGeometry(data.size, 32, 32);
      const material = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.7, metalness: 0.1 });
      const planet = new THREE.Mesh(geometry, material);
      planet.castShadow = true;
      planet.receiveShadow = true;
      planet.userData = { 
        index, 
        name: data.name, 
        info: data.info, 
        distance: data.distance, 
        speed: data.speed,
        angle: Math.random() * Math.PI * 2
      };

      // Nhãn CSS
      const div = document.createElement('div');
      div.textContent = data.name;
      div.style.color = 'white';
      div.style.fontSize = '14px';
      div.style.fontWeight = 'bold';
      div.style.textShadow = '1px 1px 3px black';
      div.style.pointerEvents = 'none';
      const label = new CSS2DObject(div);
      label.position.set(0, data.size + 2, 0);
      planet.add(label);

      // Vành đai Sao Thổ
      if (data.ring) {
        const ringGeometry = new THREE.RingGeometry(data.size * 1.4, data.size * 2.2, 64);
        const ringMaterial = new THREE.MeshBasicMaterial({ 
          color: 0xc2b280, 
          side: THREE.DoubleSide, 
          transparent: true, 
          opacity: 0.6 
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2 + 0.4;
        planet.add(ring);
      }

      // Vị trí ban đầu
      planet.position.x = Math.cos(planet.userData.angle) * data.distance;
      planet.position.z = Math.sin(planet.userData.angle) * data.distance;
      
      scene.add(planet);
      planets.push(planet);
    });

    // ─── ORBIT CONTROLS ───────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.8;
    controls.zoomSpeed = 1.2;
    controls.panSpeed = 0.7;
    controls.maxDistance = 1500;
    controls.minDistance = 15;
    controls.target.set(0, 0, 0);
    controls.update();

    // ─── UI PANEL ─────────────────────────────────────────────
    const panel = document.getElementById('info-panel');
    const nameEl = document.getElementById('planet-name');
    const detailsEl = document.getElementById('planet-details');
    const backBtn = document.getElementById('back-btn');

    function showPanel(planetData) {
      nameEl.textContent = planetData.name;
      const i = planetData.info;
      detailsEl.innerHTML = `
        <p><strong>Đường kính:</strong> ${i.diameter}</p>
        <p><strong>Khoảng cách:</strong> ${i.dist}</p>
        <p><strong>Chu kỳ quỹ đạo:</strong> ${i.period}</p>
        <p><strong>Mặt trăng:</strong> ${i.moons}</p>
        <p><strong>Nhiệt độ:</strong> ${i.temp}</p>
        <p style="margin-top:6px;border:none"><em>${i.fact}</em></p>
      `;
      panel.classList.remove('hidden');
    }

    function hidePanel() {
      panel.classList.add('hidden');
    }

    backBtn.addEventListener('click', () => {
      // Quay lại toàn cảnh
      focusOnPlanet(null);
    });

    // ─── FOCUS / UNFOCUS ──────────────────────────────────────
    let focusedPlanet = null;
    let targetCameraPos = new THREE.Vector3();
    let targetControlsTarget = new THREE.Vector3();
    let isAnimating = false;

    function focusOnPlanet(planetMesh) {
      if (focusedPlanet === planetMesh) {
        // Nếu click lại chính hành tinh đang focus -> unfocus
        planetMesh = null;
      }
      focusedPlanet = planetMesh;
      
      if (!planetMesh) {
        // Trở về toàn cảnh
        targetCameraPos.set(0, 400, 800);
        targetControlsTarget.set(0, 0, 0);
        hidePanel();
        controls.enabled = true;
      } else {
        // Focus vào hành tinh
        const pos = planetMesh.position.clone();
        const size = planetMesh.geometry.parameters.radius;
        const offset = new THREE.Vector3(0, size * 2, size * 5);
        offset.applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0.3, 0, 0))); // góc nhìn chếch
        targetCameraPos.copy(pos.clone().add(offset));
        targetControlsTarget.copy(pos);
        showPanel(planetMesh.userData);
        controls.enabled = false; // tạm khoá điều khiển khi đang focus
      }
      isAnimating = true;
    }

    // ─── RAYCASTING CLICK ─────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('click', (event) => {
      // Bỏ qua nếu click vào panel
      if (event.target.closest('#info-panel')) return;

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(planets);
      if (intersects.length > 0) {
        const clicked = intersects[0].object;
        focusOnPlanet(clicked);
      } else {
        // click vào khoảng trống -> nếu đang focus thì unfocus
        if (focusedPlanet) {
          focusOnPlanet(null);
        }
      }
    });

    // ─── ANIMATION LOOP ──────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      // Cập nhật góc quay hành tinh
      planets.forEach((planet, idx) => {
        const data = planetsData[idx];
        planet.userData.angle += data.speed;
        planet.position.x = Math.cos(planet.userData.angle) * data.distance;
        planet.position.z = Math.sin(planet.userData.angle) * data.distance;
      });

      // Tween camera khi focus/unfocus
      if (isAnimating) {
        const lerpFactor = 0.08;
        camera.position.lerp(targetCameraPos, lerpFactor);
        controls.target.lerp(targetControlsTarget, lerpFactor);
        if (camera.position.distanceTo(targetCameraPos) < 0.5 && controls.target.distanceTo(targetControlsTarget) < 0.5) {
          isAnimating = false;
        }
      }

      // Cập nhật controls (nếu enabled)
      if (controls.enabled) {
        controls.update();
      } else {
        // Khi focus, vẫn phải update controls để nó biết target thay đổi
        controls.target.copy(targetControlsTarget);
        controls.update();
      }

      // Xoay sao nền nhẹ
      stars.rotation.y += 0.0001;
      stars.rotation.x += 0.00005;

      // Render
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();

    // ─── RESIZE ──────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Ẩn panel ban đầu
    hidePanel();
  </script>
</body>
</html>
